name: Build Windows

on:
  push:
    branches: [cssoso-1.0]
    paths-ignore:
      - 'scripts/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release'
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Build-Windows-Client-32bit:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure and Build Client (32-bit)
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
        python waf configure -T release --32bits || exit /b 1
        python waf build || exit /b 1

    - name: Prepare Client Artifacts
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path artifacts-client
        if (Test-Path "build\release") {
          Copy-Item -Path "build\release\*" -Destination "artifacts-client" -Recurse
        }
        Compress-Archive -Path "artifacts-client\*" -DestinationPath "csso-client-windows-x86.zip"

    - name: Upload Client Artifact
      uses: actions/upload-artifact@v4
      with:
        name: csso-client-windows-x86
        path: csso-client-windows-x86.zip

  Build-Windows-Client-64bit:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure and Build Client (64-bit)
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        python waf configure -T release || exit /b 1
        python waf build || exit /b 1

    - name: Prepare Client Artifacts
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path artifacts-client
        if (Test-Path "build\release") {
          Copy-Item -Path "build\release\*" -Destination "artifacts-client" -Recurse
        }
        Compress-Archive -Path "artifacts-client\*" -DestinationPath "csso-client-windows-x64.zip"

    - name: Upload Client Artifact
      uses: actions/upload-artifact@v4
      with:
        name: csso-client-windows-x64
        path: csso-client-windows-x64.zip

  Build-Windows-Server-32bit:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure and Build Server (32-bit)
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
        python waf configure -T release -d --32bits || exit /b 1
        python waf build || exit /b 1

    - name: Prepare Server Artifacts
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path artifacts-server
        if (Test-Path "build\release") {
          Copy-Item -Path "build\release\*" -Destination "artifacts-server" -Recurse
        }
        Compress-Archive -Path "artifacts-server\*" -DestinationPath "csso-server-windows-x86.zip"

    - name: Upload Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: csso-server-windows-x86
        path: csso-server-windows-x86.zip

  Build-Windows-Server-64bit:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure and Build Server (64-bit)
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        python waf configure -T release -d || exit /b 1
        python waf build || exit /b 1

    - name: Prepare Server Artifacts
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path artifacts-server
        if (Test-Path "build\release") {
          Copy-Item -Path "build\release\*" -Destination "artifacts-server" -Recurse
        }
        Compress-Archive -Path "artifacts-server\*" -DestinationPath "csso-server-windows-x64.zip"

    - name: Upload Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: csso-server-windows-x64
        path: csso-server-windows-x64.zip

  Create-Release:
    needs: [Build-Windows-Client-32bit, Build-Windows-Client-64bit, Build-Windows-Server-32bit, Build-Windows-Server-64bit]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true') }}

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -R artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: win-v${{ github.run_number }}
        name: Windows Build v${{ github.run_number }}
        body: |
          CSSO Windows Build Release
          
          **Build Info:**
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          - Build Number: ${{ github.run_number }}
          
          **Downloads:**
          - `csso-client-windows-x86.zip` - Windows Client (32-bit)
          - `csso-client-windows-x64.zip` - Windows Client (64-bit)
          - `csso-server-windows-x86.zip` - Windows Server (32-bit)
          - `csso-server-windows-x64.zip` - Windows Server (64-bit)
        files: |
          artifacts/csso-client-windows-x86/csso-client-windows-x86.zip
          artifacts/csso-client-windows-x64/csso-client-windows-x64.zip
          artifacts/csso-server-windows-x86/csso-server-windows-x86.zip
          artifacts/csso-server-windows-x64/csso-server-windows-x64.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
