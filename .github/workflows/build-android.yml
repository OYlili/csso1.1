name: Build Android

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release'
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Build-Android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-8-jre zip apksigner libbz2-dev

    - name: Download Android NDK r10e
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r10e-linux-x86_64.zip
        unzip -q android-ndk-r10e-linux-x86_64.zip
        echo "ANDROID_NDK_HOME=$PWD/android-ndk-r10e" >> $GITHUB_ENV

    - name: Download Clang 11
      run: |
        wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-11.1.0/clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-16.04.tar.xz
        tar -xf clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-16.04.tar.xz
        echo "$PWD/clang+llvm-11.1.0-x86_64-linux-gnu-ubuntu-16.04/bin" >> $GITHUB_PATH

    - name: Clone mod launcher
      run: |
        git clone https://github.com/DMK95/Srceng-mod-launcher/ -b csso

    - name: Build Android (32 bit)
      run: |
        chmod +x waf
        python3 waf configure -T release --build-game=cstrike --prefix=Srceng-mod-launcher/android --android=armeabi-v7a-hard,host,21 --target=../armeabi-v7a --32bits --enable-opus --togles --disable-warns
        python3 waf install --target=client,server,engine,GameUI,vgui2,vguimatsurface,vstdlib --strip
        rm -f Srceng-mod-launcher/android/lib/armeabi-v7a/README.md 2>/dev/null || true

    - name: Build Android (64 bit)
      run: |
        python3 waf configure -T release --build-game=cstrike --prefix=Srceng-mod-launcher/android --android=aarch64,host,21 --target=../aarch64 --enable-opus --togles --disable-warns
        python3 waf install --target=client,server,engine,GameUI,vgui2,vguimatsurface,vstdlib --strip
        rm -f Srceng-mod-launcher/android/lib/arm64-v8a/README.md 2>/dev/null || true

    - name: Build APK
      run: |
        cd Srceng-mod-launcher
        git clone https://gitlab.com/LostGamer/android-sdk
        export ANDROID_SDK_HOME=$PWD/android-sdk
        chmod +x waf
        python3 waf configure -T release
        python3 waf build

    - name: Rename APK
      run: |
        mv Srceng-mod-launcher/build/android/mod-signed.apk csso-release.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: csso-apk
        path: csso-release.apk

  Create-Release:
    needs: [Build-Android]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true') }}

    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: csso-apk
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: android-v${{ github.run_number }}
        name: Android Build v${{ github.run_number }}
        body: |
          CSSO Android Build Release
          
          **Build Info:**
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          - Build Number: ${{ github.run_number }}
          
          **Downloads:**
          - `csso-release.apk` - Android APK
        files: |
          artifacts/csso-release.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
