name: Build Windows Server

on:
  push:
    branches: [cssoso-1.0]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release'
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Build-Windows-Server-32bit:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Initialize submodules
      shell: cmd
      run: |
        git submodule update --init --recursive

    - name: Configure and Build Server (32-bit)
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
        python waf distclean 2>nul || echo "No previous build to clean"
        python waf configure -T release --32bits --build-games csso || exit /b 1
        python waf build || exit /b 1

    - name: Prepare Server Artifacts
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path artifacts-server
        Write-Host "Checking build directories..."
        Get-ChildItem -Path . -Directory | ForEach-Object { Write-Host "Directory: $($_.Name)" }
        if (Test-Path "build\release") {
          Write-Host "Found build\release directory"
          Copy-Item -Path "build\release\*" -Destination "artifacts-server" -Recurse
        } elseif (Test-Path "build") {
          Write-Host "Found build directory, looking for release subdirectories"
          Get-ChildItem -Path "build" -Directory | ForEach-Object {
            Write-Host "Build subdirectory: $($_.Name)"
          }
          if (Test-Path "build\release_x86") {
            Copy-Item -Path "build\release_x86\*" -Destination "artifacts-server" -Recurse
          } elseif (Test-Path "build\release_x64") {
            Copy-Item -Path "build\release_x64\*" -Destination "artifacts-server" -Recurse
          } else {
            Write-Host "Copying entire build directory contents"
            Copy-Item -Path "build\*" -Destination "artifacts-server" -Recurse -ErrorAction SilentlyContinue
          }
        }
        Write-Host "Artifacts directory contents:"
        Get-ChildItem -Path artifacts-server -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }
        Compress-Archive -Path "artifacts-server\*" -DestinationPath "csso-server-windows-x86.zip" -Force
        Write-Host "Created zip file: $(Get-Item csso-server-windows-x86.zip | Select-Object -ExpandProperty Length) bytes"

    - name: Upload Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: csso-server-windows-x86
        path: csso-server-windows-x86.zip
        if-no-files-found: warn

  Create-Server-Release:
    needs: [Build-Windows-Server-32bit]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true') }}

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Display structure of downloaded files
      run: |
        pwd
        ls -la
        if [ -d "artifacts" ]; then
          ls -la artifacts
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: win-server-v${{ github.run_number }}
        name: Windows Server Build v${{ github.run_number }}
        body: |
          CSSO Windows Server Build Release
          
          **Build Info:**
          - Commit: ${{ github.sha }}
          - Branch: ${{ github.ref_name }}
          - Build Number: ${{ github.run_number }}
          
          **Downloads:**
          - `csso-server-windows-x86.zip` - Windows Server (32-bit)
        files: |
          artifacts/csso-server-windows-x86.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
